<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@3.6.12/dist/css/splide.min.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: transparent !important;
            overflow: hidden; /* lock background scroll on all devices */
        }

        .home-background {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
            z-index: 1;
        }

        /* Desktop / general overlay */
        .overlay-container {
            position: fixed;
            z-index: 2;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% - 200px); /* 100px margin each side */
            max-width: 1200px;
            max-height: calc(100vh - 200px);
            background-color: rgba(47, 46, 46, 0.8);
            border-radius: 20px;
            padding: 40px;
            color: #fff;
            overflow-y: auto; /* overlay scrolls, background locked */
        }

        /* Mobile: overlay fills entire screen so nothing underneath shows */
        @media (max-width: 600px) {
            .overlay-container {
                top: 70px; /* sits just below the main home bar */
                left: 0;
                transform: none;
                width: 100%;
                height: calc(100vh - 70px); /* full screen minus navbar */
                max-width: 100%;
                max-height: calc(100vh - 70px);
                border-radius: 0;
                padding: 20px;
            }
        }

        .overlay-close {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(47, 46, 46, 0.9);
            color: #fff;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .splide__pagination__page {
            background: #ccc;
            border: 1px solid #666;
            opacity: 1;
        }

            .splide__pagination__page.is-active {
                background: #fff;
            }

        .splide__slide img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }

        /* Desktop vertical centering of slider + text */
        @media (min-width: 992px) {
            .overlay-container .row.align-items-start {
                align-items: center !important;
            }

            .overlay-container .col-lg-6.col-md-12:last-child {
                display: flex;
                align-items: center;
                height: 100%;
            }

                .overlay-container .col-lg-6.col-md-12:last-child p {
                    margin: 0;
                }
        }
    </style>
</head>

<body>

    <iframe class="home-background" src="index.html"></iframe>

    <div class="overlay-container">
        <div class="overlay-close" onclick="window.location.href='index.html'">✕</div>

        <div class="container-fluid">
            <div class="row g-4 align-items-start">

                <div class="col-lg-6 col-md-12">
                    <section id="hidden-splide" class="splide" aria-label="Hidden page image slider">
                        <div class="splide__track">
                            <ul class="splide__list">
                                <li class="splide__slide">
                                    <img src="images/aboutTobySmith.webp" alt="Placeholder 1">
                                </li>
                                <li class="splide__slide">
                                    <img src="images/placeholder2.webp" alt="Placeholder 2">
                                </li>
                                <li class="splide__slide">
                                    <img src="images/placeholder3.webp" alt="Placeholder 3">
                                </li>
                            </ul>
                        </div>
                    </section>
                </div>

                <div class="col-lg-6 col-md-12">
                    <p>
                        This is Toby
                        <br />
                        <br />
                        He's scared of women
                    </p>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@3.6.12/dist/js/splide.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
        new Splide('#hidden-splide', {
        type: 'loop',
        perPage: 1,
        arrows: true,
        pagination: true
        }).mount();
        });
    </script>

</body>
</html>
